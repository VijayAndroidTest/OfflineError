name: Android Offline Tracker CI/CD (Fastlane Optimized)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_deploy:
    name: Execute Fastlane Delivery Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Set up Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true # Automatically caches your Ruby gems for faster builds!

      - name: Install Fastlane Plugins
        run: bundle exec fastlane add_plugin firebase_app_distribution --skip-gemfile-confirmation

      - name: Run Fastlane Deployment Lane
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: bundle exec fastlane deploy_debug_to_firebase