name: Android Offline Tracker CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ] # 🚀 Triggers automatically when a PR is opened

jobs:
  verify_and_deploy:
    name: Build, Test & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Set up Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # 📋 SCENARIO 1: If it's a Pull Request, ONLY run verification tests (No distribution)
      - name: Run Code Verification Checks (PR Target)
        if: github.event_name == 'pull_request'
        run: |
          ./gradlew lintDebug
          ./gradlew testDebugUnitTest

      # 🚀 SCENARIO 2: If it's a direct push/merge to main, run the full Fastlane deployment lane
      - name: Run Fastlane Deployment Lane (Push Target)
        if: github.event_name == 'push'
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: bundle exec fastlane deploy_debug_to_firebase